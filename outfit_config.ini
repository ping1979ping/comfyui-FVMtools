# ============================================================================
# FVM Outfit Generator — Configuration
# ============================================================================
# This file controls where outfit lists are loaded from and default behavior.
# Lines starting with # or ; are comments. Remove # to activate a setting.
#
# After editing: no ComfyUI restart needed — changes apply on next node execution.
# ============================================================================

[paths]
# Custom path for outfit lists (overrides built-in outfit_lists/ directory).
# Leave empty or commented out to use the built-in lists shipped with the node pack.
#
# The directory must contain outfit set subdirectories (e.g., business_female/, casual_male/).
# Each subdirectory needs: top.txt, bottom.txt, footwear.txt, headwear.txt,
#                          outerwear.txt, accessories.txt, bag.txt, fabrics.txt
#
# Examples (uncomment ONE and adjust to your system):
#
# Windows — absolute path:
; custom_lists_path = D:\MyOutfitLists
; custom_lists_path = C:\Users\YourName\Documents\ComfyUI_Outfits
; custom_lists_path = D:\AI\ComfyUI\my_custom_outfits
#
# Windows — relative to ComfyUI root:
; custom_lists_path = ..\..\user\default\outfit_lists
#
# Linux / macOS:
; custom_lists_path = /home/user/my_outfit_lists
; custom_lists_path = ~/Documents/comfyui_outfits
#
# Network / NAS path:
; custom_lists_path = \\NAS\shared\outfit_lists
#
# Tip: You can keep the built-in lists as reference and point this to your own
#      directory where you only put your custom/modified sets. The built-in sets
#      will NOT be available when a custom path is set — copy any built-in sets
#      you still want to use into your custom directory.
custom_lists_path =

[defaults]
# Default outfit set shown in the node dropdown when first added.
# Must match a subdirectory name in your outfit_lists/ (or custom path).
#
# Examples:
; default_outfit_set = business_female
; default_outfit_set = casual_male
; default_outfit_set = beach_holiday_female
; default_outfit_set = streetwear_male
default_outfit_set = general_female

# Default probabilities for optional slots (0.0 = never, 1.0 = always).
# These values are used as a baseline — style presets may override them.
# When a slot checkbox is disabled on the node, probability is forced to 0.
#
# Low values (0.1-0.2) = slot rarely appears, good for subtle variety
# Medium values (0.4-0.6) = slot appears about half the time
# High values (0.8-1.0) = slot almost always appears
#
# Examples for different use cases:
#
# Minimal outfits (top + bottom + shoes only):
; headwear_probability = 0.0
; outerwear_probability = 0.0
; accessories_probability = 0.0
; bag_probability = 0.0
#
# Fully accessorized (everything likely):
; headwear_probability = 0.70
; outerwear_probability = 0.80
; accessories_probability = 0.90
; bag_probability = 0.70
#
# Current defaults (balanced):
headwear_probability = 0.15
outerwear_probability = 0.25
accessories_probability = 0.50
bag_probability = 0.20

# ============================================================================
# Model Paths — Fallback locations for required AI models
# ============================================================================
# These paths are only used as a LAST RESORT. The search order is:
#
#   1. ComfyUI standard directories (models/insightface/, models/gfpgan/, etc.)
#   2. Paths from extra_model_paths.yaml (registered via folder_paths)
#   3. Paths configured HERE in outfit_config.ini
#
# Leave empty or commented out to use automatic detection (recommended).
# Only set these if your models are in a non-standard location.
#
# After editing: no ComfyUI restart needed — changes apply on next node execution.
# ============================================================================

[models]
# InsightFace model directory — must contain a models/buffalo_l/ subfolder.
# The buffalo_l model is auto-downloaded on first use if the directory exists
# and onnxruntime is installed.
#
# Expected structure:
#   <insightface_path>/models/buffalo_l/det_10g.onnx
#   <insightface_path>/models/buffalo_l/w600k_r50.onnx
#   <insightface_path>/models/buffalo_l/1k3d68.onnx
#   <insightface_path>/models/buffalo_l/2d106det.onnx
#   <insightface_path>/models/buffalo_l/genderage.onnx
#
# Download (HuggingFace): https://huggingface.co/public-data/insightface/tree/main/models/buffalo_l
# Download (GitHub ZIP):  https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip
#
# Examples:
; insightface_path = D:\AI\models\insightface
; insightface_path = /home/user/models/insightface
insightface_path =

# BiSeNet face parsing model — full path to the parsing_bisenet.pth file.
# Used for face/head/hair segmentation masks (19-class semantic parsing).
#
# Standard locations (searched automatically before this fallback):
#   ComfyUI/models/gfpgan/parsing_bisenet.pth
#   ComfyUI/models/facedetection/parsing_bisenet.pth
#   ComfyUI/models/facerestore_models/parsing_bisenet.pth
#
# Download (GitHub):      https://github.com/xinntao/facexlib/releases/download/v0.2.0/parsing_bisenet.pth
# Download (HuggingFace): https://huggingface.co/leonelhs/facexlib/resolve/main/parsing_bisenet.pth
#
# Examples:
; bisenet_path = D:\AI\models\facerestore_models\parsing_bisenet.pth
; bisenet_path = /home/user/models/parsing_bisenet.pth
bisenet_path =
