; FVMtools JB Builder — wildcards configuration.
;
; ``path`` may be relative to this file (the FVMtools root) or absolute.
; The directory is auto-created on first use if it doesn't exist.
;
; This file is tracked by git, so its default ships with the repo.
; The ``wildcards/`` directory is gitignored — your wildcard files
; never get overwritten by ``git pull``. To keep the dir but point at
; a different location:
;
;   1. Copy this file to ``wildcards.ini.local`` (gitignored — your
;      personal override).
;   2. Edit the ``path`` there to anywhere you want, e.g.
;        path = D:/AI/wildcards-shared
;
; The loader checks ``wildcards.ini.local`` first, then falls back to
; this file.

[wildcards]
path = wildcards
